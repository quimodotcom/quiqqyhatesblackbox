name: Android Build & Sign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Secrets referenced in the steps
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      # -------------------------------------------------
      # 1️⃣ Checkout the repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2️⃣ Set up JDK (required for Gradle)
      # -------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # -------------------------------------------------
      # 3️⃣ Restore the keystore (stored as base64)
      # -------------------------------------------------
      - name: Restore keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/my-release-key.jks
        shell: bash

      # -------------------------------------------------
      # 4️⃣ Ensure the Gradle wrapper is executable
      # -------------------------------------------------
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # -------------------------------------------------
      # 5️⃣ Build and sign the release APK/AAB
      # -------------------------------------------------
      - name: Build release
        run: |
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/my-release-key.jks \
            -Pandroid.injected.signing.store.password=${KEYSTORE_PASSWORD} \
            -Pandroid.injected.signing.key.alias=${KEY_ALIAS} \
            -Pandroid.injected.signing.key.password=${KEY_PASSWORD}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # -------------------------------------------------
      # 6️⃣ Upload the signed artifact
      # -------------------------------------------------
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: |
            app/build/outputs/apk/release/*.apk
            # If you generate an AAB instead, uncomment the next line:
            # app/build/outputs/bundle/release/*.aab

